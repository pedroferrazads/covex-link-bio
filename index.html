<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pedro Ferraz — Covex</title>
<meta name="description" content="Tráfego pago especialista em advocacia. Covex — Pedro Ferraz.">
<meta name="theme-color" content="#0A0A0A">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,700;12..96,800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0A0A0A;
    --ink: #F4F3EE;
    --muted: #7A7A75;
    --lime: #D6FF3F;
    --line: #262622;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--ink);
    font-family: 'JetBrains Mono', monospace;
    min-height: 100vh;
    display: flex;
    justify-content: center;
    position: relative;
    overflow-x: hidden;
  }
  body::before {
    content: "";
    position: fixed;
    inset: 0;
    pointer-events: none;
    opacity: 0.5;
    mix-blend-mode: overlay;
    background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='140' height='140'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='2' stitchTiles='stitch'/></filter><rect width='100%25' height='100%25' filter='url(%23n)'/></svg>");
  }

  main {
    width: 100%;
    max-width: 640px;
    padding: 28px 24px 40px;
    display: flex;
    flex-direction: column;
    min-height: 100vh;
    position: relative;
  }

  .tick {
    position: absolute;
    width: 14px;
    height: 14px;
    opacity: 0.5;
  }
  .tick::before, .tick::after {
    content: "";
    position: absolute;
    background: var(--muted);
  }
  .tick::before { width: 100%; height: 1px; top: 50%; }
  .tick::after { height: 100%; width: 1px; left: 50%; }
  .tick.tl { top: 20px; left: 20px; }
  .tick.br { bottom: 20px; right: 20px; }

  .kicker {
    font-size: 12px;
    letter-spacing: 0.18em;
    font-weight: 500;
    color: var(--lime);
    text-transform: uppercase;
    margin-top: 20px;
  }

  h1 {
    font-family: 'Bricolage Grotesque', sans-serif;
    font-weight: 800;
    font-size: clamp(58px, 15vw, 108px);
    line-height: 0.92;
    letter-spacing: -0.02em;
    text-transform: uppercase;
    margin: 18px 0 0;
    color: var(--ink);
  }
  h1 span {
    display: block;
    color: var(--muted);
    -webkit-text-stroke: 1.5px var(--muted);
    color: transparent;
  }

  .sub {
    font-size: 15px;
    color: var(--muted);
    line-height: 1.55;
    max-width: 34ch;
    margin: 26px 0 0;
    font-family: 'JetBrains Mono', monospace;
  }
  .sub b { color: var(--ink); font-weight: 500; }

  .spacer { flex: 1; min-height: 40px; }

  .cta {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    background: var(--lime);
    color: #0A0A0A;
    text-decoration: none;
    padding: 22px 22px;
    font-family: 'Bricolage Grotesque', sans-serif;
    font-weight: 800;
    font-size: clamp(18px, 4.5vw, 22px);
    text-transform: uppercase;
    letter-spacing: -0.01em;
    border: 1px solid var(--lime);
    transition: background-color 180ms ease, color 180ms ease;
    cursor: pointer;
    min-height: 44px;
  }
  .cta:hover { background: var(--bg); color: var(--lime); }
  .cta:focus-visible { outline: 2px solid var(--ink); outline-offset: 4px; }
  .cta svg { width: 24px; height: 24px; flex-shrink: 0; }

  footer {
    margin-top: 22px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    font-size: 12px;
    letter-spacing: 0.04em;
    color: var(--muted);
  }
  footer a {
    color: var(--muted);
    text-decoration: none;
    display: flex;
    align-items: center;
    gap: 6px;
    transition: color 180ms ease;
  }
  footer a:hover { color: var(--ink); }
  footer a:focus-visible { outline: 2px solid var(--muted); outline-offset: 3px; }
  footer svg { width: 14px; height: 14px; }

  @media (prefers-reduced-motion: reduce) {
    * { transition: none !important; }
  }

  @media (max-width: 380px) {
    main { padding: 24px 20px 32px; }
  }
</style>
</head>
<body>

  <span class="tick tl" aria-hidden="true"></span>

  <h1>Pedro<span>Ferraz</span></h1>

</body>
</html>
